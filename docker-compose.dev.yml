services:
  db:
    image: mysql:8
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - rcs-network

  backend:
    extends:
      file: docker-compose.yml
      service: backend
    environment:
      DB_HOST: db
    depends_on:
      - db

  customer-frontend:
    extends:
      file: docker-compose.yml
      service: customer-frontend

  admin-frontend:
    extends:
      file: docker-compose.yml
      service: admin-frontend

volumes:
  db-data:

networks:
  rcs-network:
    driver: bridge
